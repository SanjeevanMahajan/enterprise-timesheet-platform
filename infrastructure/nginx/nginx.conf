worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream backends ────────────────────────────────────────────────
    upstream api_backend {
        server web:8000;
    }

    upstream billing_backend {
        server billing-service:8001;
    }

    upstream reporting_backend {
        server reporting-service:8002;
    }

    upstream search_backend {
        server search-service:8003;
    }

    upstream notifier_backend {
        server notifier:8004;
    }

    upstream ai_backend {
        server ai-service:8005;
    }

    upstream frontend {
        server nextjs:3000;
    }

    # ── Server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Core API (FastAPI) ───────────────────────────────────────────
        # /api/v1/* → main backend on port 8000
        location /api/v1/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI health check + docs
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        location /api/docs {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        location /api/openapi.json {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Billing Service ──────────────────────────────────────────────
        # /api/billing/* → billing-service on port 8001
        # Rewrites /api/billing/stats → /api/stats, etc.
        location /api/billing/ {
            rewrite ^/api/billing/(.*)$ /api/$1 break;
            proxy_pass http://billing_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Search Service ──────────────────────────────────────────────
        # /api/search → search-service on port 8003
        location /api/search {
            proxy_pass http://search_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Notification Service ───────────────────────────────────────
        # /api/notifications → notifier on port 8004
        location /api/notifications {
            proxy_pass http://notifier_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── AI Service ─────────────────────────────────────────────────
        # /api/ai → ai-service on port 8005
        location /api/ai/ {
            proxy_pass http://ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Reporting Service ────────────────────────────────────────────
        # /api/reports/* → reporting-service on port 8002
        location /api/reports/ {
            proxy_pass http://reporting_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Next.js Frontend (catch-all) ─────────────────────────────────
        # Everything else → Next.js on port 3000
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Next.js HMR in dev, but kept for consistency)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
