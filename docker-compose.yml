services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://timesheet:timesheet@db:5432/timesheet"
      JWT_SECRET_KEY: "local-dev-secret-change-in-prod"
      REDIS_URL: "redis://redis:6379/0"
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    build: services/notification-service
    environment:
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build: services/ai-service
    environment:
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  billing-service:
    build: services/billing-service
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: "redis://redis:6379/0"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-sk_test_51XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_SUCCESS_URL: "http://localhost:3000/billing?paid=true"
      STRIPE_CANCEL_URL: "http://localhost:3000/billing?cancelled=true"
    volumes:
      - billing-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  reporting-service:
    build: services/reporting-service
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - reporting-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: timesheet
      POSTGRES_PASSWORD: timesheet
      POSTGRES_DB: timesheet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesheet"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  billing-data:
  reporting-data:
