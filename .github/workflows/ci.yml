name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + test ─────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timesheet
          POSTGRES_PASSWORD: timesheet
          POSTGRES_DB: timesheet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timesheet"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://timesheet:timesheet@localhost:5432/timesheet
      JWT_SECRET_KEY: ci-test-secret
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  # ── Frontend: type-check + build ─────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

  # ── Docker: validate compose configs ─────────────────────────────────
  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate dev compose
        run: docker compose config --quiet

      - name: Validate prod compose
        run: docker compose -f docker-compose.prod.yml config --quiet
