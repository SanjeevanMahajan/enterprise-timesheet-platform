# Alembic Configuration File

[alembic]
# path to migration environment
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# sys.path prepended with the current directory so that `src` is importable
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
timezone = UTC

# The URL is overridden at runtime by env.py from DATABASE_URL env var.
# This placeholder satisfies Alembic's config parser.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/timesheet

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
